version: '3'

services:
  backend:
    image: boreumcho/inspire-monolithic
    container_name: monolithic-backend-container
    ports:
      - "8888:8888"
    environment:
      # DB
      # SPRING_DATASOURCE_URL: jdbc:mariadb://database:3306/inspire
      SPRING_DATASOURCE_URL: jdbc:mariadb://lgcns-boreum.c5qc62i48v3x.ap-south-1.rds.amazonaws.com:3306/inspire?useSSL=true&verifyServerCertificate=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456789
      # JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_JPA_SHOW_SQL: true
      # redis
      SPARING_REDIS_HOST: redis
      SPARING_REDIS_PORT: 6379
    restart: always
    depends_on:
      # aws rds 사용시 제거
      # - database
      - redis

  # aws rds 사용시 제거
  # database:
  #   image: boreumcho/inspire-mariadb
  #   container_name: monolithic-mariadb-container
  #   ports:
  #     - "6033:3306"
  #   environment:
  #     MARIADB_USER: root
  #     MARIADB_ROOT_PASSWORD: 123456789
  #     MARIADB_DATABASE: inspire

  redis:
    image: boreumcho/inspire-redis  
    container_name: monolithic-redis-container
    ports:
      - "6379:6379"
    restart: always
