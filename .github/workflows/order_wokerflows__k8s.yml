name: deploy order

on:
  push:
    branches:
      - main

jobs:
  #job name : 자유롭게 명세 가능
  build-and-deploy:
    # runner 
    runs-on: ubuntu-latest
    steps:
      - name:
        # 명령어
        uses: actions/checkout@v2

      - name: install kubectl
        uses: azure/setup-kubectl@v3

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        # 추가적인 작업
        with:
          aws-access-key-id: ${{secrets.AWS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET}}
          aws-region: ap-south-1
      
      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-south-1 --name lgcns-boreum-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      - name: image build and push docker image to ecr
        env:
          REGISTRY: 447839931800.dkr.ecr.ap-south-1.amazonaws.com/order-boreum-backend
          REPOSITORY: order-boreum-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          
